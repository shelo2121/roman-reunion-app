<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roman Reunion">
<meta name="theme-color" content="#5c7460">
<title>Roman Reunion 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sage:#7e9a82; --sage-deep:#5c7460; --sage-soft:#e7ede6;
    --sand:#efe7d7; --cream:#f8f5ef; --paper:#ebe1cd;
    --ink:#2f342c; --muted:#8a8c81; --line:#e7dfce;
    --gold:#c7a96b; --gold-soft:#f3e9d2; --branch:#c3a983; --lake:#7fa7a3; --lake-soft:#dde9e7;
    --kids:#9a86b0; --kids-soft:#ece4f3; --boat:#6d96a3; --boat-soft:#dceaed;
    --card:#e3d5bb; --bg:#33443a; --bg2:#27352d; --on-bg:#f2ead9; --muted-bg:#b3bda8; --radius:20px;
    --shadow:0 18px 46px rgba(28,42,33,.22); --shadow-sm:0 4px 16px rgba(40,55,40,.11);
    --maxw:480px; --nav-h:66px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);
    color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  .serif,h1,h2,h3{font-family:'Playfair Display','Georgia',serif}
  .app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:linear-gradient(180deg,var(--bg),var(--bg2));position:relative;
    box-shadow:0 0 60px rgba(0,0,0,.06)}

  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:calc(13px + env(safe-area-inset-top)) 16px 13px;
    background:rgba(44,58,49,.82);backdrop-filter:saturate(1.3) blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}
  .topbar .tt{min-width:0}
  .topbar .tt small{display:block;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:#b7c8b3;font-weight:700}
  .topbar .tt span{font-size:21px;font-weight:600;color:var(--on-bg)}
  .avatar{width:42px;height:42px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:15px;cursor:pointer;border:2px solid #fff;box-shadow:var(--shadow-sm);background-size:cover;background-position:center}

  .view{padding:16px 16px calc(var(--nav-h) + 30px + env(safe-area-inset-bottom));min-height:60vh;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .hero{position:relative;border-radius:26px;overflow:hidden;box-shadow:var(--shadow);min-height:200px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;margin-bottom:4px}
  .hero img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .hero .scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(40,55,45,.12) 0%,rgba(40,55,45,.30) 45%,rgba(35,48,40,.78) 100%)}
  .hero .inner{position:relative;z-index:2;padding:20px}
  .hero .kick{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;opacity:.92;font-weight:700}
  .hero .hi{font-family:'Playfair Display','Georgia',serif;font-size:30px;font-weight:600;letter-spacing:-.3px;margin:5px 0 2px;line-height:1.06}
  .hero .day{display:inline-block;background:rgba(255,255,255,.22);backdrop-filter:blur(4px);font-size:12px;font-weight:600;padding:5px 13px;border-radius:30px;margin-top:10px;border:1px solid rgba(255,255,255,.25)}
  .hero .cd{font-size:46px;font-weight:600;line-height:1;margin:2px 0 0;font-family:'Fraunces',serif}
  .hero .cd small{font-size:14px;font-weight:400;opacity:.92;font-family:'Inter',sans-serif}
  .hero .stat{display:flex;gap:18px;margin-top:12px}
  .hero .stat b{font-size:18px;font-weight:700;font-family:'Fraunces',serif}
  .hero .stat span{font-size:11px;opacity:.9;display:block;text-transform:uppercase;letter-spacing:.5px}

  .sec{display:flex;align-items:baseline;justify-content:space-between;margin:24px 3px 10px}
  .sec h2{font-size:12.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--on-bg);font-weight:700;margin:0;font-family:'Inter',sans-serif}
  .sec a{font-size:13px;color:#a9c6ac;font-weight:600;text-decoration:none;cursor:pointer}

  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--line);overflow:hidden;margin:12px 0}
  .pad{padding:15px 16px}
  img.cover{width:100%;height:160px;object-fit:cover;display:block;background:var(--sage-soft)}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:30px;background:var(--sage-soft);color:var(--sage-deep);letter-spacing:.3px;vertical-align:middle}
  .pill.gold{background:var(--gold-soft);color:#9c7d3b}.pill.boat{background:var(--boat-soft);color:var(--boat)}
  .pill.meal{background:var(--gold-soft);color:#9c7d3b}.pill.kids{background:var(--kids-soft);color:var(--kids)}
  .pill.req{background:#f6dada;color:#a85656}.pill.lake{background:var(--lake-soft);color:#4f7a76}
  .muted{color:var(--muted);font-size:13px}

  .ev{background:var(--card);border:1px solid var(--line);border-radius:18px;margin:11px 0;box-shadow:var(--shadow-sm);overflow:hidden}
  .ev .evtop{display:flex;cursor:pointer}
  .ev .evthumb{width:104px;flex:none;background:var(--sage-soft);position:relative;overflow:hidden}
  .ev .evthumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .ev .evthumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;opacity:.5}
  .ev .evbody{flex:1;min-width:0;padding:12px 13px}
  .ev .evtime{font-size:12px;font-weight:700;color:var(--sage-deep);letter-spacing:.3px}
  .ev .evttl{font-weight:600;font-size:16px;margin:2px 0 5px;font-family:'Fraunces',serif;line-height:1.15}
  .ev .evmeta{font-size:12px;color:var(--muted)}
  .ev .nowtag{font-size:9.5px;font-weight:800;color:#fff;background:var(--sage);padding:2px 7px;border-radius:20px;letter-spacing:.6px;margin-left:6px;vertical-align:middle}
  .ev .evfoot{padding:0 13px 13px;display:flex;flex-direction:column;gap:9px}
  .poc{display:inline-flex;align-items:center;gap:7px;background:var(--lake-soft);color:#46716d;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:30px;align-self:flex-start}
  .poc .pocav{width:20px;height:20px;border-radius:50%;background:var(--lake);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .joinrow{display:flex;align-items:center;gap:11px}
  .evnote{font-size:13px;color:#56564c;border-top:1px dashed var(--line);padding-top:9px}
  .crewrow{display:flex;gap:8px;flex-wrap:wrap}
  .crew{display:inline-flex;align-items:center;gap:7px;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:6px 11px;font-size:12.5px;font-weight:600}
  .crew .ci{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px}
  .crew.cook .ci{background:var(--gold-soft)}.crew.clean .ci{background:var(--lake-soft)}
  .crew small{color:var(--muted);font-weight:500}

  .daybar{display:flex;gap:7px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none;margin:0 -2px}
  .daybar::-webkit-scrollbar{display:none}
  .day-btn{flex:none;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:8px 5px;width:52px;text-align:center;cursor:pointer;transition:.12s}
  .day-btn span{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .day-btn b{display:block;font-size:17px;margin-top:1px;font-family:'Fraunces',serif}
  .day-btn.active{background:var(--sage);border-color:var(--sage);color:#fff;box-shadow:var(--shadow-sm)}
  .day-btn.active span{color:rgba(255,255,255,.85)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 13px;box-shadow:var(--shadow-sm);cursor:pointer;display:flex;flex-direction:column;gap:7px;transition:transform .12s,box-shadow .12s;min-height:80px;justify-content:space-between}
  .tile:active{transform:scale(.97)}
  .tile .ic{width:34px;height:34px;border-radius:11px;background:var(--sage-soft);display:flex;align-items:center;justify-content:center}
  .tile .ic svg{width:19px;height:19px;stroke:var(--sage-deep);fill:none;stroke-width:1.8}
  .tile .lab{font-weight:600;font-size:14px;font-family:'Fraunces',serif}
  .tile .sub{font-size:11.5px;color:var(--muted);margin-top:-5px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;font-weight:700;font-size:14px;padding:11px 16px;border-radius:14px;background:var(--sage);color:#fff;box-shadow:var(--shadow-sm);transition:transform .1s,background .15s;font-family:'Inter',sans-serif}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--sage-soft);color:var(--sage-deep)}.btn.joined{background:var(--sage-deep)}
  .btn.full{width:100%}.btn.sm{padding:8px 13px;font-size:13px;border-radius:12px}
  .maplink{display:inline-flex;align-items:center;gap:6px;color:var(--sage-deep);font-weight:600;font-size:13px;text-decoration:none;align-self:flex-start}

  .rootchip{display:flex;align-items:center;gap:12px;justify-content:center;background:var(--gold-soft);border:1px solid var(--gold);border-radius:16px;padding:11px 16px;margin-bottom:12px}
  .rootchip .rootn{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
  .rootchip .roots{font-size:11px;color:#9c7d3b}
  .bcard{background:var(--paper);border:1px solid var(--line);border-radius:18px;margin:10px 0;box-shadow:var(--shadow-sm);overflow:hidden}
  .bhead{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer}
  .bav{width:38px;height:38px;border-radius:50%;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex:none;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .bttl{font-family:'Fraunces',serif;font-weight:600;font-size:15.5px;flex:1;line-height:1.15}
  .bttl small{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:11.5px;color:var(--muted)}
  .bchev{color:var(--muted);font-size:13px;transition:transform .25s}
  .bcard.open .bchev{transform:rotate(180deg)}
  .bbody{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .bcard.open .bbody{max-height:2200px}
  .tscroll{overflow-x:auto;padding:8px 14px 16px}
  .tscroll::-webkit-scrollbar{height:5px}.tscroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
  .tinner{display:inline-flex;min-width:100%;justify-content:safe center}
  .tnode{display:inline-flex;flex-direction:column;align-items:center}
  .tcouple{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:5px;box-shadow:var(--shadow-sm)}
  .tamp{color:var(--gold);font-size:10px}
  .tp{display:flex;flex-direction:column;align-items:center;gap:3px;width:52px;cursor:pointer;position:relative;padding:2px 1px}
  .tpav{width:32px;height:32px;border-radius:50%;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .tpn{font-size:9.5px;font-weight:600;text-align:center;line-height:1.05}
  .tgo{position:absolute;top:0;right:7px;width:8px;height:8px;border-radius:50%;background:var(--sage);border:1.5px solid #fff;z-index:1}
  .tkids{display:flex;justify-content:center;gap:8px;position:relative;padding-top:15px;margin-top:2px}
  .tkids:before{content:"";position:absolute;top:0;left:50%;width:2px;height:7px;background:var(--branch)}
  .tkids.multi:after{content:"";position:absolute;top:7px;left:13%;right:13%;height:2px;background:var(--branch)}
  .tchild{position:relative;padding-top:7px}
  .tchild:before{content:"";position:absolute;top:0;left:50%;width:2px;height:7px;background:var(--branch)}

  .prow{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:15px;margin:8px 0;box-shadow:var(--shadow-sm);cursor:pointer}
  .prow .av{width:42px;height:42px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;background-size:cover;background-position:center}
  .prow .nm{font-weight:600;font-size:15px}.prow .meta{font-size:12.5px;color:var(--muted)}.prow .chev{margin-left:auto;color:var(--muted);font-size:20px}
  .badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--sage-soft);color:var(--sage-deep)}
  .badge.no{background:#f1e2e2;color:#a06363}.badge.maybe{background:var(--gold-soft);color:#9c7d3b}

  .mlink{display:flex;align-items:center;gap:13px;padding:15px 15px;background:var(--card);border:1px solid var(--line);border-radius:16px;margin:10px 0;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm)}
  .mlink .ic{width:36px;height:36px;border-radius:11px;background:var(--sage-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .mlink .chev{margin-left:auto;color:var(--muted);font-size:20px}

  .note{display:flex;gap:12px;padding:15px;background:var(--card);border:1px solid var(--line);border-radius:18px;margin:10px 0;box-shadow:var(--shadow-sm)}
  .note .nic{width:38px;height:38px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--sage-soft)}
  .note .ntt{font-weight:600;font-size:15px;margin:0 0 2px;font-family:'Fraunces',serif}.note .nmsg{font-size:13.5px;color:#56564c}
  .note.pin{border-color:var(--gold);background:#fffdf6}

  .photos{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .photo{aspect-ratio:1;border-radius:16px;overflow:hidden;background:var(--sage-soft);display:flex;align-items:flex-end;position:relative;border:1px solid var(--line)}
  .photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .photo .cap{position:relative;z-index:1;color:#fff;font-size:12px;font-weight:700;padding:9px 11px;width:100%;background:linear-gradient(transparent,rgba(0,0,0,.6))}
  .photo.placeholder .cap{color:var(--sage-deep);background:none}

  .modal{position:fixed;inset:0;background:rgba(40,42,35,.55);display:none;align-items:flex-end;justify-content:center;z-index:100;animation:fade .2s}
  .modal.open{display:flex}
  .sheet{background:var(--cream);width:100%;max-width:var(--maxw);border-radius:26px 26px 0 0;padding:8px 16px calc(28px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto;animation:slideup .3s cubic-bezier(.2,.8,.2,1)}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .grab{width:42px;height:5px;border-radius:5px;background:var(--line);margin:8px auto 16px}
  .sheet h3{margin:0 0 4px;font-size:22px}
  .field{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:13px;font-size:15px;margin:6px 0 4px;outline:none;background:#fff;font-family:inherit}
  textarea.field{min-height:84px;resize:vertical}
  .label{font-size:11.5px;font-weight:700;color:var(--sage-deep);text-transform:uppercase;letter-spacing:.7px;margin-top:14px;display:block}
  .name-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .name-grid button{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 9px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink);text-align:left;display:flex;align-items:center;gap:9px}
  .name-grid button:active{background:var(--sage-soft)}
  .name-grid .mini{width:26px;height:26px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;background-size:cover;background-position:center}
  .toggle{position:relative;width:50px;height:29px;flex:none}.toggle input{display:none}
  .toggle .tr{position:absolute;inset:0;background:var(--line);border-radius:30px;transition:.2s}
  .toggle .tr:before{content:"";position:absolute;width:23px;height:23px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle input:checked + .tr{background:var(--sage)}.toggle input:checked + .tr:before{transform:translateX(21px)}
  .setrow{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}.setrow:last-child{border:none}
  .setrow .sl{font-weight:600;font-size:15px}.setrow .ss{font-size:12.5px;color:var(--muted)}

  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--maxw);background:rgba(44,58,49,.92);border-top:1px solid rgba(255,255,255,.08);display:flex;padding:8px 4px calc(9px + env(safe-area-inset-bottom));backdrop-filter:blur(14px);z-index:50}
  .nav button{flex:1;background:none;border:none;color:var(--muted-bg);font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px 2px;position:relative;font-family:'Inter',sans-serif}
  .nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.8}
  .nav button.active{color:#f0ead9}.nav button.active svg{fill:rgba(255,255,255,.14)}
  .nav .ndot{position:absolute;top:1px;right:50%;margin-right:-15px;width:8px;height:8px;border-radius:50%;background:#c46b6b;border:2px solid #fff;display:none}
  .nav .ndot.show{display:block}

  .empty{text-align:center;color:var(--muted-bg);padding:38px 14px;font-size:14px}.empty .em{font-size:32px;display:block;margin-bottom:10px}
  a.link{color:var(--sage-deep);font-weight:600;text-decoration:none}
  .chiprow{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 6px}
  .filterchip{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:30px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--muted)}
  .filterchip.active{background:var(--sage);color:#fff;border-color:var(--sage)}
  .photoedit{display:flex;gap:14px;align-items:center;margin:8px 0 4px}
  .pe-prev{width:72px;height:72px;border-radius:50%;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:24px;flex:none;border:2px solid #fff;box-shadow:var(--shadow-sm)}
  .kidsignup{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:2px}
  .ksl{font-size:12px;color:var(--muted);font-weight:700;width:100%}
  .kidchip{font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:30px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--sage-deep)}
  .kidchip.on{background:var(--sage);color:#fff;border-color:var(--sage)}
  .trunk{width:3px;height:16px;background:var(--branch);margin:-2px auto 8px;border-radius:2px}
  .rsvp{display:flex;gap:8px;margin-top:2px}
  .rbtn{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 6px;font-weight:700;font-size:13px;cursor:pointer;color:var(--ink)}
  .rbtn.yes.on{background:var(--sage);color:#fff;border-color:var(--sage)}
  .rbtn.no.on{background:#bd6a6a;color:#fff;border-color:#bd6a6a}
  .tcouple.married{border-color:var(--gold)}
  .tring{display:flex;align-items:center;font-size:13px;padding:0 1px}
  .solowrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:9px}
  .solocard{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:11px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;box-shadow:var(--shadow-sm)}

}

function fam(){return members();}
function mealField(m,keys){for(const k of keys){const v=((m[k]||"")+"").trim();if(v&&v.toLowerCase()!=="tbd")return v;}return "";}
function actDesc(x){const n=(x.Name||"").toLowerCase();if(n.includes("grab the wig"))return "Two players go head-to-head, each wearing a wig. First to pull the wig off your opponent wins the round! No need to bring anything — we provide the wigs.";return x.Description||"";}
function isHonorary(m){const t=((m.Notes||"")+" "+(m["Family Branch"]||"")+" "+(m.Lineage||"")+" "+(m.Relationship||"")+" "+(m.Relation||"")).toLowerCase();return /honor|honour/.test(t);}
function soloCard(m){const att=(m.Attending||"").toLowerCase()==="yes";return `<div class="solocard" onclick='openMember(${JSON.stringify(m.Name)})'>${att?'<span class="tgo"></span>':''}${avHTML(m,"sav")}<div class="son">${esc(first(m.Name))}${isMe(m.Name)?' ⭐':''}</div></div>`;}
function childrenOf(name,spouse){const nl=(name||"").toLowerCase(),sl=spouse?(spouse||"").toLowerCase():"~~";return fam().filter(p=>{const par=(p.Parent||"").toLowerCase();if(!par)return false;const toks=par.split(/\s+and\s+|,|&/).map(s=>s.trim());return (toks.includes(nl)||toks.includes(sl))&&p.Name!==name&&(!spouse||p.Name!==spouse);});}
window._rpath=window._rpath||[];
window._ftview=window._ftview||"tree";
function treeMembers(){const live=DATA["Members"]||[];const ln=new Set(live.map(m=>m.Name));return live.concat((window._baseMembers||[]).filter(m=>m.Name&&!ln.has(m.Name)));}
function spouseOf(p){if(!p||!p.Spouse)return null;return treeMembers().find(x=>x.Name===p.Spouse)||treeMembers().find(x=>first(x.Name)===first(p.Spouse))||null;}
function bioKids(name){const nl=(name||"").toLowerCase();return treeMembers().filter(p=>{const par=(p.Parent||"").toLowerCase();if(!par)return false;return par.split(/\s+and\s+|,|&/).map(z=>z.trim()).includes(nl);});}
function blended(m){return /step|blend/i.test(m.Notes||"");}
function isSibRel(m){return !blended(m)&&/\bbrother\b|\bsister\b|\bsibling\b/i.test(m.Notes||"");}
function kidsOf(p){const allbio=bioKids(p.Name).filter(x=>x.Name!==p.Name);const sp=spouseOf(p);const spk=sp?bioKids(sp.Name).filter(x=>x.Name!==p.Name&&x.Name!==sp.Name&&!allbio.some(b=>b.Name===x.Name)):[];const branchStep=treeMembers().filter(x=>x.Name!==p.Name&&(x["Family Branch"]||"")===p.Name&&blended(x)&&!isHonorary(x)&&!allbio.some(b=>b.Name===x.Name));const sib=treeMembers().filter(x=>x.Name!==p.Name&&(x["Family Branch"]||"")===p.Name&&isSibRel(x)&&!isHonorary(x)&&!allbio.some(b=>b.Name===x.Name));const bio=allbio.filter(x=>!blended(x)&&!isSibRel(x));let step=allbio.filter(x=>blended(x)).concat(spk).concat(branchStep);const seen={};step=step.filter(x=>seen[x.Name]?false:(seen[x.Name]=true));return {kids:bio,step:step,sib:sib};}
function honAttachedTo(h){const br=(h["Family Branch"]||"").trim();const tm=treeMembers();if(br){const m=tm.find(x=>x.Name===br&&x.Name!==h.Name);if(m&&!isHonorary(m))return m.Name;}const notes=(h.Notes||"").toLowerCase();const cand=tm.find(x=>x.Name!==h.Name&&!isHonorary(x)&&first(x.Name).length>2&&notes.indexOf(first(x.Name).toLowerCase())>=0&&hasFamily(x));return cand?cand.Name:null;}
function honoraryFor(p){return treeMembers().filter(h=>isHonorary(h)&&honAttachedTo(h)===p.Name);}
function famSize(p){const kk=kidsOf(p);return kk.kids.length+kk.step.length+(kk.sib?kk.sib.length:0)+honoraryFor(p).length;}
function hasFamily(p){const kk=kidsOf(p);return (kk.kids.length+kk.step.length+(kk.sib?kk.sib.length:0))>0;}
function findRoot(){let p=treeMembers().find(m=>(m.Name||"").toLowerCase()==="hugo roman");if(p)return p;const cnt={};treeMembers().forEach(m=>{(m.Parent||"").split(/\s+and\s+|,|&/).map(s=>s.trim()).filter(Boolean).forEach(nm=>{cnt[nm]=(cnt[nm]||0)+1;});});let best=null,bc=0;Object.keys(cnt).forEach(nm=>{const row=treeMembers().find(x=>x.Name===nm||first(x.Name)===first(nm));if(row&&row.Parent)return;if(cnt[nm]>bc){bc=cnt[nm];best=nm;}});if(best){return treeMembers().find(x=>x.Name===best||first(x.Name)===first(best))||{Name:best,Spouse:"",Attending:"",_virtual:true};}return treeMembers().find(m=>!m.Parent)||treeMembers()[0];}

function panelKid(c,tag){const hk=famSize(c)>0;const att=(c.Attending||"").toLowerCase()==="yes";let badge="";if(tag==="step")badge=' <span class="stepbadge">step</span>';else if(tag==="honorary")badge=' <span class="stepbadge" style="background:var(--gold-soft);color:#9c7d3b">honorary</span>';else if(tag==="sibling"){const nn=(c.Notes||"").toLowerCase();const lbl=/brother/.test(nn)?"brother":/sister/.test(nn)?"sister":"sibling";badge=' <span class="stepbadge" style="background:var(--lake-soft);color:#46716d">'+lbl+'</span>';}return `<div class="rpkid" onclick='${hk?`panelDrill(${JSON.stringify(c.Name)})`:`openMember(${JSON.stringify(c.Name)})`}'>${rav(c,"rpkav")}<div class="rpkn">${esc(first(c.Name))}${badge}${att?' <span class="goingdot"></span>':''}</div><span class="rpkc" style="${hk?'':'opacity:.35'}">${hk?'family ›':'profile ›'}</span></div>`;}

  if(sp)h+=`<div class="rpkid" onclick='openMember(${JSON.stringify(sp.Name)})'>${rav(sp,"rpkav")}<div class="rpkn">${esc(first(sp.Name))} <span class="stepbadge" style="background:var(--lake-soft);color:#46716d">spouse</span></div><span class="rpkc" style="opacity:.35">profile ›</span></div>`;
  if(kk.kids.length){h+=`<div class="rplabel">Children</div>`+kk.kids.map(c=>panelKid(c,"")).join("");}

function openMember(name){

  else {if(about)h+=`<span class="label">About</span><p>${esc(about)}</p>`;if(bday)h+=`<span class="label">Birthday</span><p>🎂 ${esc(fmtBday(bday))}</p>`;}

function fmtBday(b){const m=(""+b).match(/(\d{4})-(\d{2})-(\d{2})/);if(!m)return b;const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return mo[+m[2]-1]+" "+(+m[3]);}
function bdayISO(b){const m=(""+b).match(/(\d{4})-(\d{2})-(\d{2})/);return m?m[1]+"-"+m[2]+"-"+m[3]:"";}
function saveProfile(name){const o={about:($("ab")?$("ab").value:"")};if($("bd"))o.bday=$("bd").value;LS.setProf(name,o);if(name===ME){try{rrSaveMe();}catch(e){}}closeModal();updateAvatar();toast("Profile saved ✓");if(CUR==="family")vFamily();}

function handlePhoto(input,name){const fl=input.files&&input.files[0];if(!fl)return;const rd=new FileReader();rd.onload=ev=>{const im=new Image();im.onload=()=>{openCrop(im,ev.target.result,name);};im.onerror=()=>toast("Couldn’t read that image");im.src=ev.target.result;};rd.readAsDataURL(fl);}
function openCrop(img,src,name){window._crop={img:img,name:name,drag:null,scale:1,base:1,BOX:260,x:0,y:0};var h='<div class="grab"></div><h3 class="serif" style="margin-bottom:4px">Position your photo</h3><p class="muted" style="margin:0 0 12px;font-size:13px">Drag to move, slide to zoom. The circle shows how it’ll appear.</p><div class="cropbox" id="cropBox"><img id="cropImg" src="'+src+'" draggable="false"><div class="cropring"></div></div><input type="range" min="1" max="3.5" step="0.01" value="1" id="cropZoom" class="cropzoom" oninput="cropZoom(this.value)"><div style="display:flex;gap:9px;margin-top:14px"><button class="btn ghost full" onclick="openMember(window._crop.name)">Cancel</button><button class="btn full" onclick="cropSave()">Use photo</button></div>';openSheet(h);setTimeout(cropInit,40);}
function cropInit(){var c=window._crop,box=$("cropBox");if(!c||!box)return;var B=box.clientWidth||260;c.BOX=B;c.base=Math.max(B/c.img.width,B/c.img.height);c.scale=c.base;c.x=(B-c.img.width*c.scale)/2;c.y=(B-c.img.height*c.scale)/2;cropApply();cropBind();}
function cropApply(){var c=window._crop,im=$("cropImg");if(!c||!im)return;im.style.width=(c.img.width*c.scale)+"px";im.style.height=(c.img.height*c.scale)+"px";im.style.left=c.x+"px";im.style.top=c.y+"px";}
function cropClamp(){var c=window._crop,w=c.img.width*c.scale,h=c.img.height*c.scale;c.x=Math.min(0,Math.max(c.BOX-w,c.x));c.y=Math.min(0,Math.max(c.BOX-h,c.y));}
function cropZoom(v){var c=window._crop;if(!c)return;var cx=c.BOX/2,cy=c.BOX/2,old=c.scale;c.scale=c.base*(+v);var k=c.scale/old;c.x=cx-(cx-c.x)*k;c.y=cy-(cy-c.y)*k;cropClamp();cropApply();}
function cropBind(){var box=$("cropBox");if(!box||box._bound)return;box._bound=true;function pt(e){var t=(e.touches&&e.touches[0])?e.touches[0]:e;return {x:t.clientX,y:t.clientY};}function start(e){var c=window._crop;if(!c)return;var p=pt(e);c.drag={px:p.x,py:p.y,ox:c.x,oy:c.y};e.preventDefault();}function move(e){var c=window._crop;if(!c||!c.drag)return;var p=pt(e);c.x=c.drag.ox+(p.x-c.drag.px);c.y=c.drag.oy+(p.y-c.drag.py);cropClamp();cropApply();e.preventDefault();}function end(){if(window._crop)window._crop.drag=null;}box.addEventListener("mousedown",start);document.addEventListener("mousemove",move);document.addEventListener("mouseup",end);box.addEventListener("touchstart",start,{passive:false});box.addEventListener("touchmove",move,{passive:false});box.addEventListener("touchend",end);}
function cropSave(){var c=window._crop;if(!c)return;var S=256,cn=document.createElement("canvas");cn.width=S;cn.height=S;var g=cn.getContext("2d");var sw=c.BOX/c.scale,sh=c.BOX/c.scale,sx=-c.x/c.scale,sy=-c.y/c.scale;g.drawImage(c.img,sx,sy,sw,sh,0,0,S,S);var url;try{url=cn.toDataURL("image/jpeg",0.85);}catch(e){toast("Couldn’t save photo");return;}try{LS.setProf(c.name,{photo:url});}catch(e){toast("Photo too large — try a smaller one");return;}if(c.name===ME){try{rrSaveMe();}catch(e){}}updateAvatar();toast("Photo updated ✓");openMember(c.name);}

/* ===== Unwritten family music video (dark, condensed) ===== */
let UWFILTER="available";
function uwTrue(v){return String(v||"").trim().toLowerCase()==="true";}
function uwPH(s){return !s||/^\s*\[.*\]\s*$/.test(s);}
function uwSecs(){return (DATA["Unwritten"]||[]).slice().filter(s=>s.slot_id).sort((a,b)=>(+a.display_order||0)-(+b.display_order||0));}
function uwMax(s){const m=parseInt(s.max_people,10);return isNaN(m)?4:m;}
function uwAllClaims(){
  const sheet=(DATA["Unwritten Claims"]||[]).map(o=>({slot_id:o.slot_id||o.Slot||"",name:o.name||o.Name||"",group_members:o.group_members||o.members||o.Members||"",group_name:o.group_name||o.Group||""}));
  const merged=sheet.concat(LS.uwClaims());const seen={},out=[];
  merged.forEach(c=>{if(!c.slot_id)return;const k=c.slot_id+"|"+(c.name||"").toLowerCase()+"|"+(c.group_name||"").toLowerCase();if(seen[k])return;seen[k]=1;out.push(c);});
  return out;
}
function uwClaimsFor(id){return uwAllClaims().filter(c=>(c.slot_id||"").trim()===id);}
function uwCount(id){let n=0;uwClaimsFor(id).forEach(c=>{n+=1;n+=(c.group_members||"").split(/[,/&]+| and /i).map(x=>x.trim()).filter(Boolean).length;});return n;}
function uwNames(id){const out=[];uwClaimsFor(id).forEach(c=>{if(c.group_name)out.push(c.group_name);else{if(c.name)out.push(first(c.name));(c.group_members||"").split(/[,/&]+| and /i).forEach(n=>{n=n.trim();if(n)out.push(first(n));});}});return out;}
function uwState(s){if(uwTrue(s.full_family_reserved)||!uwTrue(s.claimable))return "family";return uwCount(s.slot_id)>0?"claimed":"available";}
function uwCounts(){const c={all:0,available:0,claimed:0,family:0};uwSecs().forEach(s=>{c.all++;c[uwState(s)]++;});return c;}
function uwCard(s){
  const st=uwState(s),id=s.slot_id;
  const hasLyr=!uwPH(s.lyrics_text);
  const sub=hasLyr?("“"+esc(s.lyrics_text)+"”"):'<span style="opacity:.45">Tap to view &amp; claim</span>';
  const lyrHtml=hasLyr?('<p class="uw-lyr">“'+esc(s.lyrics_text)+'”</p>'):'<p class="uw-lyr" style="opacity:.5;font-style:italic">Lyrics coming soon</p>';
  const ideas=s.creative_ideas_hover?('<div class="uw-iinner">'+esc(s.creative_ideas_hover)+'</div>'):"";
  let chip,body="";
  if(st==="family"){
    chip='<span class="uw-chip fa">★ Everyone</span>';
    body=lyrHtml+ideas+'<div class="uw-fam">Filmed all together on music video night — nothing to claim here. 🎬</div>';
  }else if(st==="claimed"){
    const cnt=uwCount(id),mx=uwMax(s),full=cnt>=mx;
    chip='<span class="uw-chip cl">Claimed</span>';
    body=lyrHtml+ideas+'<div style="margin-top:7px">'+uwNames(id).map(n=>'<span class="uw-pill">'+esc(n)+'</span>').join("")+'</div>'+
      (full?'<button class="uw-claimbtn full">This part’s full</button>':'<div class="uw-spots">'+(mx-cnt)+' more can join</div><button class="uw-claimbtn" onclick="uwClaim(\''+id+'\')">Join this part</button>');
  }else{
    chip='<span class="uw-chip av">Open</span>';
    body=lyrHtml+ideas+'<button class="uw-claimbtn" onclick="uwClaim(\''+id+'\')">'+esc(s.claim_button_text||"Claim this part")+'</button>';
  }
  return '<div class="uw-card '+st+'"><div class="uw-hd" onclick="var c=this.closest(\'.uw-card\');c.classList.toggle(\'open\');c.querySelector(\'.uw-body\').classList.toggle(\'open\')"><span class="uw-time">'+esc(s.start_time)+' – '+esc(s.end_time)+'</span><div class="uw-hdmid"><div class="uw-sub">'+sub+'</div></div>'+chip+'<span class="uw-chev">▸</span></div><div class="uw-body">'+body+'</div></div>';
}
function vUnwritten(){
  window._reopenSheet=vUnwritten;
  const secs=uwSecs(),c=uwCounts();
  const claimable=secs.filter(s=>uwTrue(s.claimable)&&!uwTrue(s.full_family_reserved));
  const done=claimable.filter(s=>uwCount(s.slot_id)>0).length;
  const pct=claimable.length?Math.round(done/claimable.length*100):0;
  let h='<div class="uwwrap"><div class="uw-bar"><span class="uw-bartitle">🎬 Music Video</span><button class="uw-x" onclick="closeModal()" aria-label="Close">✕</button></div>';
  h+='<p class="uw-intro">Pick a part, record it with your group, and send it in. Tap a part to see lyrics & claim it.</p>';
  h+='<div class="uw-prog"><i style="width:'+pct+'%"></i></div><div class="uw-proglab"><span>'+done+' of '+claimable.length+' parts claimed</span><span>'+pct+'%</span></div>';
  const defs=[["available","Open"],["all","All"],["claimed","Claimed"],["family","Full Family"]];
  h+='<div class="uw-tabs">'+defs.map(d=>'<button class="uw-tab '+(UWFILTER===d[0]?"on":"")+'" onclick="UWFILTER=\''+d[0]+'\';vUnwritten()">'+d[1]+'<span class="n">'+(d[0]==="all"?c.all:c[d[0]])+'</span></button>').join("")+'</div>';
  let list=secs;if(UWFILTER!=="all")list=secs.filter(s=>uwState(s)===UWFILTER);
  h+=list.length?list.map(uwCard).join(""):'<div style="padding:24px;text-align:center;color:#9db5a6">Nothing here — try another tab.</div>';
  if(!CLAIM_ENDPOINT)h+='<p class="uw-hint" style="text-align:center;margin-top:14px">Claims save on your phone for now.</p>';
  h+='</div>';
  openSheet(h,true);
}
function uwClaim(id){
  const s=uwSecs().find(x=>x.slot_id===id)||{};const mx=uwMax(s);
  openSheet('<div class="uwwrap"><div class="uw-bar"><button class="uw-back" onclick="vUnwritten()">‹ Back</button><span class="uw-bartitle">Claim a part</span><button class="uw-x" onclick="closeModal()" aria-label="Close">✕</button></div>'+
    '<div style="font-weight:800;font-size:16px;margin:4px 0 2px">'+esc(s.start_time)+' – '+esc(s.end_time)+'</div>'+

function uwSubmit(id){
  const name=($("uwf_name").value||"").trim();
  if(!name){$("uwf_name").focus();$("uwf_name").style.borderColor="#d98b6a";return;}
  const rec={slot_id:id,name:name,group_members:($("uwf_group").value||"").trim(),group_name:($("uwf_gname").value||"").trim(),contact:"",ts:new Date().toISOString()};
  LS.addUwClaim(rec);
  if(CLAIM_ENDPOINT){try{fetch(CLAIM_ENDPOINT,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(rec)});}catch(e){}}
  addLog("Claimed a music-video part");UWFILTER="claimed";vUnwritten();toast("You’ve got it! 🎉 Record it & send it in.");

function spouseRec(){const me=meRec();if(me&&me.Spouse){const sp=attendees().find(x=>x.Name===me.Spouse)||attendees().find(x=>first(x.Name)===first(me.Spouse));if(sp)return sp;}return attendees().find(x=>x.Spouse&&(x.Spouse===ME||first(x.Spouse)===first(ME)))||null;}
function myPeople(noSpouse){const out=[];const sp=noSpouse?null:spouseRec();if(sp)out.push(sp);const me=ME.toLowerCase(),meF=first(ME).toLowerCase();attendees().forEach(p=>{const par=(p.Parent||"").toLowerCase();if(!par)return;const toks=par.split(/\s+and\s+|,|&/).map(x=>x.trim());if((toks.includes(me)||toks.includes(meF))&&["kid","toddler","teen"].includes((p["Age Group"]||"").toLowerCase()))out.push(p);});const seen={};return out.filter(p=>p.Name!==ME&&(seen[p.Name]?false:(seen[p.Name]=true)));}

/* live refresh — every open pulls the latest sheet. Members only overwrites when the live tab actually has attendees, so an incomplete sheet never wipes the roster. */
const LIVE_TABS=["Reunion Info","Pickleball","Hiking Carpool","Members","Announcements","Locations","Photos","FAQ","House Rules","Packing List","Bringing From Home","Unwritten","Unwritten Claims","Taco Truck Menu","Hibachi Preorders"];
function csvUrl(tab){return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&headers=1&sheet=${encodeURIComponent(tab)}`;}
function parseCSV(t){const rows=[];let row=[],cur="",q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'){if(t[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===','){row.push(cur);cur="";}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}else if(c==='\r'){}else cur+=c;}}if(cur!==""||row.length){row.push(cur);rows.push(row);}return rows;}
function toObj(rows){if(!rows.length)return[];const h=rows[0].map(x=>x.trim());return rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>o[k]=(r[i]||"").trim());return o;}).filter(o=>Object.values(o).some(v=>v));}
async function liveRefresh(){try{
  const results=await Promise.all(LIVE_TABS.map(async t=>{try{const r=await fetch(csvUrl(t),{cache:"no-store"});if(!r.ok)return null;return toObj(parseCSV(await r.text()));}catch(e){return null;}}));
  let any=false;results.forEach((res,i)=>{if(!res||!res.length)return;const tab=LIVE_TABS[i];if(tab==="Members"&&res.length<8)return;DATA[tab]=res;any=true;});
  if(any){normalizeDates();go(CUR);}
}catch(e){}}

  window._reopenSheet=openKidsSwap;
  var kids=(DATA["Schedule"]||[]).filter(function(e){return e._sid&&e._kids;}).slice().sort(rrSortSched);
  var h='<div class="grab"></div><h3 class="serif">Kids Activities</h3><p class="muted" style="margin:0 0 6px">Swap a scheduled kids activity for another one. The day and time stay exactly the same.</p>';
  if(!kids.length)h+='<p class="muted">No kids activities are on the schedule right now.</p>';
  kids.forEach(function(e){h+='<div class="rr-row"><div class="t"><b>'+esc(e.Title)+'</b><span>'+esc(e.Date)+' · '+esc(e["Start Time"]||"")+'</span></div><button class="rr-mini" onclick=\'openSwapPicker('+JSON.stringify(e._sid)+')\'>Swap</button></div>';});
  openSheet(h);
}
function openSwapPicker(sid){
  var cat=window._CATALOG;var opts=cat?(cat.activities||[]).filter(function(a){return a.is_kids;}):[];
  var e=(DATA["Schedule"]||[]).find(function(x){return x._sid===sid;})||{};
  var h='<div class="grab"></div><h3 class="serif">Swap “'+esc(e.Title||"")+'”</h3><p class="muted" style="margin:0 0 6px">Choose the kids activity for this slot ('+esc(e.Date||"")+' '+esc(e["Start Time"]||"")+').</p>';
  if(!opts.length)h+='<p class="muted">No kids activities available.</p>';
  opts.forEach(function(a){h+='<div class="rr-row"><div class="t"><b>'+esc(a.name)+'</b><span>'+(a.scheduled?"currently on the schedule":"unscheduled")+'</span></div><button class="rr-mini" onclick=\'doSwap('+JSON.stringify(sid)+','+JSON.stringify(a.id)+')\'>Use this</button></div>';});
  openSheet(h);
}
async function doSwap(sid,aid){
  var r=await rpc("rr_kids_swap",{p_token:TOKEN,p_schedule_id:sid,p_new_activity_id:aid});
  if(r&&r.ok){toast("Swapped to "+(r.title||"new activity"));await loadSupabase();go(CUR);(ROLE==="kids_editor"?openKidsSwap:openManage)();}
  else toast((r&&r.error)||"Couldn’t swap");
}

/* ---------- admin: view PIN status + reset (editors only) ---------- */
async function openAdmin(){
  window._reopenSheet=openAdmin;
  var r=await rpc("rr_admin_members",{p_token:TOKEN});
  if(!r||!r.ok){toast((r&&r.error)||"Not authorized");return;}
  var h='<div class="grab"></div><h3 class="serif">Family Access</h3><p class="muted" style="margin:0 0 6px">PINs are private and cannot be shown (they’re encrypted). If someone is locked out, reset their PIN and they’ll set a new one next time they sign in.</p>';
  (r.members||[]).forEach(function(m){
    var role=m.role==="editor"?"Editor":m.role==="kids_editor"?"Kids editor":"Member";
    h+='<div class="rr-row"><div class="t"><b>'+esc(m.name)+(m.role!=="viewer"?'<span class="rr-badge">'+role+'</span>':'')+'</b><span>'+(m.has_pin?"PIN set":"no PIN yet")+'</span></div>';
    if(m.has_pin)h+='<button class="rr-mini danger" onclick=\'adminReset('+JSON.stringify(m.name)+')\'>Reset PIN</button>';
    h+='</div>';
  });
  openSheet(h);
}
async function adminReset(name){
  if(typeof confirm==="function"&&!confirm("Reset "+name+"’s PIN?\n\nThey’ll be signed out and will create a new PIN the next time they open the app."))return;
  var r=await rpc("rr_reset_pin",{p_token:TOKEN,p_name:name});
  if(r&&r.ok){toast(name+"’s PIN was reset");openAdmin();}
  else toast((r&&r.error)||"Couldn’t reset");
}


/* ===== family board ===== */

/* ==================== FAMILY BOARD: announcements + messages ==================== */
function rrTimeAgo(ts){try{var d=new Date(ts);var s=(Date.now()-d.getTime())/1000;if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";if(s<604800)return Math.floor(s/86400)+"d ago";return d.toLocaleDateString();}catch(e){return"";}}
async function vBoard(){
  setTitle("Announcements & messages","Alerts");window._reopenSheet=null;
  V().innerHTML='<div class="empty" style="padding:26px">Loading…</div>';
  var res=await Promise.all([rpc("rr_ann_list",{p_token:TOKEN}),rpc("rr_messages_list",{p_token:TOKEN})]);
  var ann=res[0]||{},msgs=res[1]||{};
  if(ann.ok===false&&ann.error){ V().innerHTML='<div class="empty" style="padding:26px">Please sign in to see the family board.</div>'; return; }
  var h='<div style="display:flex;gap:8px;margin:2px 0 8px"><button class="btn full" style="flex:1;min-width:0" onclick="composeAnn()">📣 Announce</button><button class="btn ghost full" style="flex:1;min-width:0" onclick="composeMsg()">💬 Ask / post</button></div>';
  h+='<button class="btn ghost full sm" style="margin:0 0 6px" onclick="vNotifications()">🔔 Event reminders &amp; today</button>';
  h+='<div class="sec"><h2>Announcements</h2></div>';
  var items=ann.items||[];
  if(!items.length)h+='<div class="empty" style="padding:18px">No announcements yet.</div>';
  items.forEach(function(a){
    h+='<div class="card"><div class="pad">';
    if(a.title)h+='<p class="evttl" style="font-size:16px;margin:0 0 3px">'+esc(a.title)+'</p>';
    h+='<p style="color:#56564c;margin:0 0 9px;white-space:pre-wrap">'+esc(a.body)+'</p>';
    h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="muted" style="font-size:12px">'+esc(a.author||"")+' · '+rrTimeAgo(a.ts)+'</span>';
    if(a.i_acked)h+='<span class="badge">You saw this ✓</span>';
    else h+='<button class="rr-mini" onclick=\'ackAnn('+JSON.stringify(a.id)+')\'>✓ I saw this</button>';
    h+='</div>';
    if(ann.editor){h+='<div style="margin-top:9px;border-top:1px solid var(--line);padding-top:8px"><span class="muted" style="font-size:12px">👁 '+(a.ack_count||0)+' saw this'+((a.ackers&&a.ackers.length)?': '+a.ackers.map(function(n){return esc(first(n));}).join(", "):"")+'</span></div>';}
    if(a.mine||ann.editor)h+='<button class="rr-link" style="text-align:left;padding:6px 0 0;width:auto" onclick=\'delAnn('+JSON.stringify(a.id)+')\'>Dismiss</button>';
    h+='</div></div>';
  });
  h+='<div class="sec"><h2>Family Board</h2></div>';
  var M=msgs.messages||[];
  if(!M.length)h+='<div class="empty" style="padding:18px">No messages yet — say hi 👋</div>';
  M.forEach(function(m){
    h+='<div class="card"><div class="pad" style="padding:11px 13px"><div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline"><b style="font-weight:700;color:var(--sage-deep)">'+esc(m.author||"")+'</b><span class="muted" style="font-size:11px">'+rrTimeAgo(m.ts)+'</span></div><p style="margin:4px 0 0;white-space:pre-wrap">'+esc(m.body)+'</p>'+((m.mine||ROLE==='editor')?'<button class="rr-link" style="text-align:left;padding:4px 0 0;font-size:12px;width:auto" onclick=\'delMsg('+JSON.stringify(m.id)+')\'>Delete</button>':'')+'</div></div>';
  });
  V().innerHTML=h;
}
function composeMsg(){openSheet('<div class="grab"></div><h3 class="serif">Post to the family board</h3><p class="muted" style="margin:0 0 8px">Ask a question or share something — everyone can see it.</p><textarea class="field" id="cmsg" rows="4" placeholder="Type your message…"></textarea><button class="rr-primary" style="margin-top:10px" onclick="sendMsg()">Post</button><button class="rr-link" onclick="closeModal()">Cancel</button>');setTimeout(function(){var i=$("cmsg");if(i)i.focus();},60);}
async function sendMsg(){var b=($("cmsg").value||"").trim();if(!b){toast("Write a message first");return;}var r=await rpc("rr_message_post",{p_token:TOKEN,p_body:b});if(r&&r.ok){closeModal();toast("Posted 👍");vBoard();}else toast((r&&r.error)||"Couldn’t post");}
function composeAnn(){openSheet('<div class="grab"></div><h3 class="serif">Post an announcement</h3><p class="muted" style="margin:0 0 8px">Everyone will see it, and they can tap “I saw this.”</p><input class="field" id="cantitle" placeholder="Title (optional)"><textarea class="field" id="canbody" rows="4" placeholder="What should everyone know?"></textarea><button class="rr-primary" style="margin-top:10px" onclick="sendAnn()">Post announcement</button><button class="rr-link" onclick="closeModal()">Cancel</button>');setTimeout(function(){var i=$("cantitle");if(i)i.focus();},60);}
async function sendAnn(){var t=($("cantitle").value||"").trim();var b=($("canbody").value||"").trim();if(!b){toast("Write the announcement");return;}var r=await rpc("rr_ann_post",{p_token:TOKEN,p_title:t,p_body:b});if(r&&r.ok){closeModal();toast("Announcement posted 📣");vBoard();}else toast((r&&r.error)||"Couldn’t post");}
async function ackAnn(id){var r=await rpc("rr_ann_ack",{p_token:TOKEN,p_id:id});if(r&&r.ok)vBoard();}
async function delAnn(id){if(typeof confirm==="function"&&!confirm("Dismiss this announcement for everyone?"))return;var r=await rpc("rr_ann_delete",{p_token:TOKEN,p_id:id});if(r&&r.ok)vBoard();}
async function delMsg(id){if(typeof confirm==="function"&&!confirm("Delete this message?"))return;var r=await rpc("rr_message_delete",{p_token:TOKEN,p_id:id});if(r&&r.ok)vBoard();}


/* ===== round-2: general editor swap, Hugo, image fallback ===== */
function openSwapAny(sid){
  var e=(DATA["Schedule"]||[]).find(function(x){return x._sid===sid;})||{};
  var cat=window._CATALOG; if(!cat){toast("Catalog still loading — try again");return;}
  var type=(e._type==='meal')?'meal':'activity';
  var opts;
  if(type==='meal') opts=(cat.meals||[]).map(function(m){return {id:m.id,label:m.meal_type+(m.meal_date?' \u00b7 '+m.meal_date:''),scheduled:m.scheduled};});
  else opts=(cat.activities||[]).map(function(a){return {id:a.id,label:a.name+(a.is_kids?' (kids)':''),scheduled:a.scheduled};});
  var h='<div class="grab"></div><h3 class="serif">Swap \u201c'+esc(e.Title||"")+'\u201d</h3><p class="muted" style="margin:0 0 6px">Pick what goes in this slot ('+esc(e.Date||"")+' '+esc(e["Start Time"]||"")+'). The day and time stay the same.</p>';
  if(!opts.length)h+='<p class="muted">Nothing available to swap in.</p>';
  opts.forEach(function(o){h+='<div class="rr-row"><div class="t"><b>'+esc(o.label)+'</b><span>'+(o.scheduled?"on the schedule":"unscheduled")+'</span></div><button class="rr-mini" onclick=\'doSwapAny('+JSON.stringify(sid)+','+JSON.stringify(type)+','+JSON.stringify(o.id)+')\'>Use this</button></div>';});
  openSheet(h);
}
async function doSwapAny(sid,type,id){
  var e=(DATA["Schedule"]||[]).find(function(x){return x._sid===sid;})||{};
  var r=await rpc("rr_schedule_add",{p_token:TOKEN,p_item_type:type,p_item_id:id,p_day:e.Date,p_start:e["Start Time"],p_end:e["End Time"]||null,p_replace_id:sid,p_force:true});
  if(r&&r.ok){toast("Swapped");await loadSupabase();go(CUR);openManage();}
  else toast((r&&r.error)||"Couldn\u2019t swap");
}
function hugoFix(){
  try{
    var arr=window._baseMembers||(window._baseMembers=[]);
    var h=arr.find(function(m){return (m.Name||"").toLowerCase()==="hugo roman";});
    if(!h){h={Name:"Hugo Roman"};arr.push(h);}
    h["Photo URL"]=HUGO_PHOTO;h["Living Status"]="Deceased";h.Notes=HUGO_ABOUT;h.Bio=HUGO_ABOUT;h["About Me"]=HUGO_ABOUT;h.About=HUGO_ABOUT;
    h["Family Branch"]="Roman";if(!h.Birthday)h.Birthday="1935-12-22";h.Attending="";
    var dm=(DATA["Members"]||[]).find(function(m){return (m.Name||"").toLowerCase()==="hugo roman";});
    if(dm){dm["Photo URL"]=HUGO_PHOTO;dm.Notes=HUGO_ABOUT;dm["About Me"]=HUGO_ABOUT;dm.About=HUGO_ABOUT;dm["Living Status"]="Deceased";}
  }catch(e){}
}
document.addEventListener('error',function(ev){var t=ev.target;if(t&&t.tagName==='IMG'&&t.src&&t.src.indexOf('data:image/svg')<0&&!t.dataset.rrfb){t.dataset.rrfb='1';t.src=RR_PLACEHOLDER;}},true);


/* ===== round-3: profile sync to Supabase ===== */
async function rrSaveMe(){
  if(!TOKEN)return;
  var ov=(LS.prof()[ME])||{};
  var payload=Object.assign({},window._meMember||{});
  if(ov.photo!==undefined)payload.photo=ov.photo||"";
  if(ov.about!==undefined)payload.about=ov.about||"";
  if(ov.bday!==undefined)payload.birthday=(""+(ov.bday||"")).replace(/T.*/,"");
  window._meMember=payload;
  try{await rpc("rr_update_me",{p_token:TOKEN,p_member:payload});}catch(e){}
}
function rrLoadMe(){
  var m=window._meMember||{};var patch={};
  if(m.photo)patch.photo=m.photo;
  if(m.about)patch.about=m.about;
  if(m.birthday)patch.bday=m.birthday;
  if(Object.keys(patch).length){try{LS.setProf(ME,patch);}catch(e){}}
}
